services:
  # 网易云音乐 API Enhanced - 从本地源码构建
  netease-music-api:
    build:
      context: ../netease-api/api-enhanced-main
    container_name: netease-music-api
    ports:
      - "3000:3000"
    environment:
      # 从 .env 文件读取 Cookie
      - COOKIE=${NCM_COOKIE}
      # 启用 CORS
      - ENABLE_CORS=true
      # 设置为生产模式
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - ai-dj-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ai-dj-network:
    driver: bridge
